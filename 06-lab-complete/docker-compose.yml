services:
  agent:
    build: .
    ports:
      - "${PORT:-8000}:8000"
    environment:
      - AGENT_API_KEY=${AGENT_API_KEY}
      - JWT_SECRET=${JWT_SECRET}
      - REDIS_URL=redis://redis:6379/0
      - ENVIRONMENT=production
    depends_on:
      - redis
    restart: always

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    restart: always
